<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Single diagonal katana, monochrome for activity bar -->
  <g transform="translate(12 12) rotate(-45)" fill="#C5C5C5">
    <!-- Blade -->
    <rect x="-1" y="-10" width="2" height="11"/>
    <!-- Tip -->
    <polygon points="-1,-10 1,-10 0,-12"/>
    <!-- Guard -->
    <rect x="-3.5" y="1" width="7" height="1.2" rx="0.3"/>
    <!-- Handle -->
    <rect x="-1.2" y="2.5" width="2.4" height="8" rx="0.4"/>
    <!-- Wrap lines -->
    <rect x="-1.2" y="4" width="2.4" height="0.5" fill="#7a7a7a"/>
    <rect x="-1.2" y="6" width="2.4" height="0.5" fill="#7a7a7a"/>
    <rect x="-1.2" y="8" width="2.4" height="0.5" fill="#7a7a7a"/>
  </g>
</svg>
